name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: write # py-cov-action pushes the coverage badge/data branch
      pull-requests: write # py-cov-action posts the coverage comment
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies (uv)
        run: |
          uv sync --dev --frozen

      - name: Run Ruff check
        run: uv run ruff check .

      - name: Run Ruff format check
        run: uv run ruff format --check .

      - name: Set up Node.js # for Pyright
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Run Pyright
        run: uv run pyright

      - name: Run tests
        run: uv run pytest

      # Posts the coverage comment on PRs and updates the badge branch on main.
      # Runs even when the fail_under gate fails so the report still shows up.
      - name: Coverage comment
        if: ${{ always() }}
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
